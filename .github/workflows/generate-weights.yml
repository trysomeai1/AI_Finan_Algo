name: Generate Target Weights

# 매주 일요일 22:00 UTC = 월요일 07:00 KST (월요일 09:05 KST 리밸런싱 전에 비중 갱신)
on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch: {}   # 수동 실행 버튼

jobs:
  weights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install yfinance gspread google-auth pandas numpy

      - name: Generate & write weights
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}   # 서비스계정 JSON (전체 내용)
          SHEET_ID: ${{ secrets.SHEET_ID }}        # TargetWeights가 있는 시트 ID
        run: python generate_weights.py
